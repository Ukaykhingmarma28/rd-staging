[www]
user  = www-data
group = www-data

listen = 0.0.0.0:9000

; ── Process manager ─────────────────────────────────────────────
; dynamic: spawn workers as needed, free them when idle
pm                      = dynamic

; Max simultaneous PHP requests (tune: container RAM - OPcache - overhead / ~256MB per worker)
; (2304 - 128 - 64 - 256) / 256 ≈ 7, 8 with headroom (most workers use ~80-150MB)
pm.max_children         = 8

; Workers kept alive at all times
pm.start_servers        = 3

; Min idle workers waiting for requests
pm.min_spare_servers    = 1

; Max idle workers (kill extras above this)
pm.max_spare_servers    = 4

; Recycle workers after this many requests (prevents memory leaks)
pm.max_requests         = 500

; ── Slow log ────────────────────────────────────────────────────
slowlog                 = /var/log/php-fpm-slow.log
request_slowlog_timeout = 5s

; ── Status page (useful for monitoring) ─────────────────────────
pm.status_path = /status
ping.path      = /ping