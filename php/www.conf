[www]
user  = www-data
group = www-data

listen = 0.0.0.0:9000

; ── Process manager ─────────────────────────────────────────────
; dynamic: spawn workers as needed, free them when idle
pm                      = dynamic

; Max simultaneous PHP requests (tune: container RAM - OPcache - overhead / ~512MB per worker)
; (8192 - 256 - 512) / 512 ≈ 14 real capacity, 20 with headroom (most workers use ~80-150MB)
pm.max_children         = 20

; Workers kept alive at all times
pm.start_servers        = 6

; Min idle workers waiting for requests
pm.min_spare_servers    = 3

; Max idle workers (kill extras above this)
pm.max_spare_servers    = 10

; Recycle workers after this many requests (prevents memory leaks)
pm.max_requests         = 500

; ── Slow log ────────────────────────────────────────────────────
slowlog                 = /var/log/php-fpm-slow.log
request_slowlog_timeout = 5s

; ── Status page (useful for monitoring) ─────────────────────────
pm.status_path = /status
ping.path      = /ping