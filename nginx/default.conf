# ── General per-IP rate limit for PHP (10 req/s, generous for real users) ──
limit_req_zone $binary_remote_addr zone=PHPLIMIT:10m rate=10r/s;

# ── Tier 1 — SEO-critical bots (search engines + social previews) ─
map $http_user_agent $is_seo_bot {
    default 0;
    "~*Googlebot"           1;
    "~*bingbot"             1;
    "~*Baiduspider"         1;
    "~*YandexBot"           1;
    "~*DuckDuckBot"         1;
    "~*Sogou"               1;
    "~*Exabot"              1;
    "~*ia_archiver"         1;
    "~*Applebot"            1;
    "~*meta-externalagent"  1;
    "~*facebookexternalhit" 1;
    "~*Facebot"             1;
    "~*Twitterbot"          1;
    "~*LinkedInBot"         1;
    "~*Slackbot"            1;
    "~*TelegramBot"         1;
    "~*Discordbot"          1;
    "~*Pinterestbot"        1;
    "~*WhatsApp"            1;
}

# Tier 1 rate limit key (2r/s — only keyed for SEO bot UAs)
map $is_seo_bot $seo_bot_limit_key {
    0  "";
    1  $binary_remote_addr;
}
limit_req_zone $seo_bot_limit_key zone=SEOBOTLIMIT:10m rate=2r/s;

# ── Tier 2 — Other crawlers (SEO tools, AI bots) ─────────────────
map $http_user_agent $is_other_bot {
    default 0;
    "~*AhrefsBot"           1;
    "~*SemrushBot"          1;
    "~*DotBot"              1;
    "~*MJ12bot"             1;
    "~*PetalBot"            1;
    "~*Bytespider"          1;
    "~*GPTBot"              1;
    "~*ChatGPT-User"        1;
    "~*ClaudeBot"           1;
    "~*Claude-Web"          1;
    "~*CCBot"               1;
    "~*DataForSeoBot"       1;
    "~*Amazonbot"           1;
    "~*archive\.org_bot"    1;
}

# Tier 2 rate limit key (1r/2s — only keyed for other bot UAs)
map $is_other_bot $other_bot_limit_key {
    0  "";
    1  $binary_remote_addr;
}
limit_req_zone $other_bot_limit_key zone=OTHERBOTLIMIT:10m rate=30r/m;

# ── Tier 3 — Generic scrapers (blocked with 403) ─────────────────
map $http_user_agent $is_scraper {
    default 0;
    "~*Scrapy"              1;
    "~*curl/"               1;
    "~*wget/"               1;
    "~*python-requests"     1;
    "~*httpx"               1;
    "~*Go-http-client"      1;
    "~*Java/"               1;
    "~*libwww-perl"         1;
    "~*PHP/"                1;
    "~*Ruby"                1;
    "~*Mechanize"           1;
    "~*Nutch"               1;
    "~*ColdFusion"          1;
    "~*HTTrack"             1;
    ""                      1;
}

# ── Block abusive shop filter scraping ────────────────────────────
# Scrapers systematically crawl WooCommerce filter combos (price + sort + pagination)
# per_row= and shop_view= in URLs are scraper indicators — real users set these via AJAX/cookies
map $args $is_scraper_query {
    default 0;
    # Any request with per_row= in the query string (never set by real users via URL)
    "~*per_row="                                      1;
    # shop_view= combined with any filter param
    "~*shop_view=.*orderby="                          1;
    "~*orderby=.*shop_view="                          1;
    "~*shop_view=.*min_price="                        1;
    "~*min_price=.*shop_view="                        1;
    # Price filter + sort (with or without max_price)
    "~*min_price=.*orderby=.*per_page="               1;
    "~*min_price=.*max_price=.*orderby="              1;
}

# ── Detect HTTPS from Cloudflare CF-Visitor header ───────────────
# Cloudflare sends: CF-Visitor: {"scheme":"https"}
# We pass HTTPS=on to PHP so WordPress knows it's secure
map $http_cf_visitor $cf_https {
    default    "";
    '~*https'  "on";
}

server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php index.html;

    client_max_body_size 128M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "0" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # ── Block Tier 3 scrapers (generic tools + empty UA) ──────────────
    if ($is_scraper) { return 403; }

    # ── Block sensitive files ───────────────────────────────────────
    location ~* /\.(ht|git|env) { deny all; }
    location = /xmlrpc.php       { deny all; }

    # ── Block FPM status/ping from public access ────────────────────
    location ~ ^/(status|ping)$ { deny all; }

    # ── Static assets (repeat security headers — Nginx inheritance) ─
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?|ttf|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        log_not_found off;
        try_files $uri =404;
    }

    # ── wp-admin — dedicated block, hard cache bypass ─────────────
    location ^~ /wp-admin/ {
        try_files $uri $uri/ /wp-admin/index.php?$args;

        location ~ \.php$ {
            fastcgi_pass wordpress:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param HTTPS $cf_https;
            include fastcgi_params;

            fastcgi_buffers      16 16k;
            fastcgi_buffer_size  32k;
            fastcgi_read_timeout 300;
        }
    }

    # ── wp-login.php ────────────────────────────────────────────
    location = /wp-login.php {
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS $cf_https;
        include fastcgi_params;

        fastcgi_buffers      16 16k;
        fastcgi_buffer_size  32k;
        fastcgi_read_timeout 7200;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # ── PHP-FPM + FastCGI Cache ───────────────────────────────────
    location ~ \.php$ {
        # Block scraper query patterns (return 429 immediately)
        if ($is_scraper_query) { return 429; }

        # Tiered bot rate limits
        limit_req zone=SEOBOTLIMIT burst=5 nodelay;
        limit_req zone=OTHERBOTLIMIT burst=3 nodelay;

        # General per-IP rate limit
        limit_req zone=PHPLIMIT burst=30 nodelay;
        limit_req_status 429;

        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS $cf_https;
        include fastcgi_params;

        fastcgi_buffers          16 16k;
        fastcgi_buffer_size      32k;
        fastcgi_read_timeout     300;
    }
}
